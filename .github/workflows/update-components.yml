name: Update Component files

on:
  push:
    paths:
      - ".github/workflows/update-components.yml"
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update-components:
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: Install Node.JS
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Update Files
        run: node updateComponents.js

      - name: Push changes to repository
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m "chore: update Elysiae components registry" && git push origin HEAD:main || echo "No changes are necessary"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
